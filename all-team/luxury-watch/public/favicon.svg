<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer gold watch case ring -->
  <circle cx="50" cy="50" r="44" stroke="#D4AF37" stroke-width="6" fill="#0B0B0B" />
  
  <!-- Inner gold bezel ring -->
  <circle cx="50" cy="50" r="37" stroke="#D4AF37" stroke-width="2" stroke-dasharray="2 2" />
  
  <!-- Hour markings / Bezel ticks -->
  <line x1="50" y1="12" x2="50" y2="18" stroke="#D4AF37" stroke-width="3" stroke-linecap="round" />
  <line x1="50" y1="88" x2="50" y2="82" stroke="#D4AF37" stroke-width="3" stroke-linecap="round" />
  <line x1="12" y1="50" x2="18" y2="50" stroke="#D4AF37" stroke-width="3" stroke-linecap="round" />
  <line x1="88" y1="50" x2="82" y2="50" stroke="#D4AF37" stroke-width="3" stroke-linecap="round" />
  
  <!-- Watch Hands in gold -->
  <line x1="50" y1="50" x2="50" y2="28" stroke="#D4AF37" stroke-width="3.5" stroke-linecap="round" />
  <line x1="50" y1="50" x2="68" y2="50" stroke="#D4AF37" stroke-width="4.5" stroke-linecap="round" />
  
  <!-- Center crown pin -->
  <circle cx="50" cy="50" r="4.5" fill="#D4AF37" />
  <circle cx="50" cy="50" r="2" fill="#0B0B0B" />
</svg>
